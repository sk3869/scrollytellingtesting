<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <radialGradient id="bgGrad" cx="40%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2a1810"/>
      <stop offset="60%" stop-color="#130b06"/>
      <stop offset="100%" stop-color="#080402"/>
    </radialGradient>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c97840" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c97840" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8b870" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#e8b870" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGrad)"/>

  <!-- Ambient glow -->
  <ellipse cx="480" cy="400" rx="380" ry="280" fill="url(#glowA)" opacity="0.5"/>
  <ellipse cx="720" cy="300" rx="260" ry="200" fill="url(#glowB)" opacity="0.4"/>

  <!-- Neural network connections -->
  <g stroke="#c97840" stroke-opacity="0.18" stroke-width="1" fill="none" filter="url(#softBlur)">
    <line x1="320" y1="200" x2="480" y2="320"/>
    <line x1="480" y1="320" x2="620" y2="260"/>
    <line x1="620" y1="260" x2="740" y2="340"/>
    <line x1="740" y1="340" x2="860" y2="280"/>
    <line x1="480" y1="320" x2="500" y2="460"/>
    <line x1="500" y1="460" x2="640" y2="500"/>
    <line x1="640" y1="500" x2="740" y2="340"/>
    <line x1="640" y1="500" x2="660" y2="620"/>
    <line x1="500" y1="460" x2="380" y2="540"/>
    <line x1="380" y1="540" x2="320" y2="200" opacity="0.08"/>
    <line x1="860" y1="280" x2="900" y2="420"/>
    <line x1="900" y1="420" x2="740" y2="340"/>
    <line x1="900" y1="420" x2="820" y2="560"/>
    <line x1="820" y1="560" x2="660" y2="620"/>
    <line x1="320" y1="200" x2="260" y2="320"/>
    <line x1="260" y1="320" x2="380" y2="540"/>
    <line x1="620" y1="260" x2="680" y2="160"/>
    <line x1="680" y1="160" x2="800" y2="180"/>
    <line x1="800" y1="180" x2="860" y2="280"/>
  </g>

  <!-- Brighter secondary connections -->
  <g stroke="#e8c090" stroke-opacity="0.28" stroke-width="0.8" fill="none">
    <line x1="480" y1="320" x2="620" y2="260"/>
    <line x1="620" y1="260" x2="740" y2="340"/>
    <line x1="500" y1="460" x2="640" y2="500"/>
    <line x1="740" y1="340" x2="900" y2="420"/>
  </g>

  <!-- Neural nodes -->
  <g filter="url(#nodeGlow)">
    <circle cx="320" cy="200" r="5" fill="#e8b870" opacity="0.9"/>
    <circle cx="480" cy="320" r="7" fill="#c97840" opacity="1"/>
    <circle cx="620" cy="260" r="5" fill="#e8b870" opacity="0.85"/>
    <circle cx="740" cy="340" r="8" fill="#c97840" opacity="1"/>
    <circle cx="860" cy="280" r="5" fill="#e8b870" opacity="0.8"/>
    <circle cx="500" cy="460" r="6" fill="#c97840" opacity="0.9"/>
    <circle cx="640" cy="500" r="6" fill="#e8b870" opacity="0.85"/>
    <circle cx="660" cy="620" r="4" fill="#c97840" opacity="0.7"/>
    <circle cx="380" cy="540" r="5" fill="#e8b870" opacity="0.75"/>
    <circle cx="900" cy="420" r="6" fill="#c97840" opacity="0.85"/>
    <circle cx="820" cy="560" r="4" fill="#e8b870" opacity="0.7"/>
    <circle cx="260" cy="320" r="4" fill="#c97840" opacity="0.75"/>
    <circle cx="680" cy="160" r="4" fill="#e8b870" opacity="0.7"/>
    <circle cx="800" cy="180" r="4" fill="#c97840" opacity="0.7"/>
  </g>

  <!-- Subtle brain outline -->
  <path d="M 420 180 C 380 160 320 170 300 210 C 280 250 290 290 310 320 C 290 340 280 370 300 400 C 310 420 330 430 360 435 C 360 460 370 490 390 510 C 420 535 460 530 490 510 C 510 530 550 545 590 535 C 630 545 670 530 690 510 C 720 530 760 535 790 510 C 810 490 820 460 820 435 C 850 430 870 420 880 400 C 900 370 890 340 870 320 C 890 290 900 250 880 210 C 860 170 800 160 760 180 C 740 160 700 150 660 155 C 630 140 590 138 560 145 C 530 138 490 140 460 155 C 440 150 428 162 420 180 Z"
        fill="none" stroke="#e8b870" stroke-width="1.5" stroke-opacity="0.22" stroke-linejoin="round"/>
</svg>
