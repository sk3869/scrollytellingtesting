<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <radialGradient id="hbBg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#3d0a0a"/>
      <stop offset="100%" stop-color="#100202"/>
    </radialGradient>
    <filter id="hbGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softHb">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="1000" height="700" fill="url(#hbBg)"/>

  <!-- Ambient glow left (heart) -->
  <ellipse cx="270" cy="350" rx="200" ry="180" fill="#c0392b" opacity="0.12" filter="url(#softHb)"/>
  <!-- Ambient glow right (brain) -->
  <ellipse cx="730" cy="350" rx="200" ry="180" fill="#8d4e2f" opacity="0.10" filter="url(#softHb)"/>

  <!-- Heart shape -->
  <path d="M 270 290 C 270 250 230 220 190 240 C 150 260 145 310 175 345 L 270 445 L 365 345 C 395 310 390 260 350 240 C 310 220 270 250 270 290 Z"
        fill="#c0392b" fill-opacity="0.75" stroke="#e74c3c" stroke-width="2" stroke-opacity="0.9" filter="url(#hbGlow)"/>

  <!-- Brain shape (right) -->
  <path d="M 660 245 C 640 230 610 235 600 255 C 585 245 560 248 552 268 C 535 260 515 268 510 288 C 495 285 478 295 478 315 C 470 325 470 345 482 355 C 478 370 484 388 498 395 C 498 415 512 430 530 432 C 535 448 552 458 570 452 C 582 462 600 462 612 452 C 626 462 646 458 654 445 C 672 448 688 435 690 418 C 706 415 718 400 716 384 C 730 378 738 362 734 346 C 748 336 750 316 738 306 C 742 288 730 270 714 266 C 706 250 686 242 670 248 C 666 244 662 242 660 245 Z"
        fill="none" stroke="#e8b870" stroke-width="2" stroke-opacity="0.7" filter="url(#hbGlow)"/>

  <!-- Connection vessels -->
  <g stroke="#c97840" stroke-opacity="0.6" stroke-width="2" fill="none" filter="url(#hbGlow)">
    <path d="M 370 340 C 420 340 450 340 480 340"/>
    <path d="M 370 355 C 400 370 430 365 460 355 C 490 345 510 348 530 355"/>
    <path d="M 370 325 C 410 315 450 320 480 328"/>
  </g>
  <!-- Pulse on connection -->
  <g stroke="#e74c3c" stroke-opacity="0.5" stroke-width="1.5" fill="none">
    <polyline points="405,340 415,325 425,355 435,320 445,345 455,340"/>
  </g>

  <!-- Label: heart -->
  <text x="270" y="490" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#e8a090" opacity="0.55" letter-spacing="3">HEART</text>
  <!-- Label: brain -->
  <text x="600" y="490" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#e8c090" opacity="0.55" letter-spacing="3">BRAIN</text>
  <!-- Label: connection -->
  <text x="500" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#ffffff" opacity="0.30" letter-spacing="2">blood supply</text>
</svg>
